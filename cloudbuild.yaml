steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - northamerica-northeast1-docker.pkg.dev/spring-boot-docker-app/spring-boot-docker-app/spring-boot-app:$SHORT_SHA
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - northamerica-northeast1-docker.pkg.dev/spring-boot-docker-app/spring-boot-docker-app/spring-boot-app:$SHORT_SHA

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - spring-boot-app
      - --image
      - northamerica-northeast1-docker.pkg.dev/spring-boot-docker-app/spring-boot-docker-app/spring-boot-app:$SHORT_SHA
      - --region
      - northamerica-northeast1
      - --platform
      - managed
      - --allow-unauthenticated

options:
  logging: CLOUD_LOGGING_ONLY
version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: dockerfile.prod
    container_name: spring-boot-docker-app
    #image: spring-boot-docker-app
    image: northamerica-northeast1-docker.pkg.dev/spring-boot-docker-app/spring-boot-docker-app/spring-boot-app:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      APP_PASS: 123123
      PORT: 8080
    deploy:
      resources:
        limits:
          memory: 512M